name: CI-CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: devops-docker-app
  REGISTRY: docker.io

jobs:
  # ===== CI: build + tests + lint =====
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Baja el código del repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        # Instala Python 3.12 para correr tests

      - name: Install deps for tests
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest
        # Dependencias de aplicación + pytest

      - name: Run unit tests
        run: pytest -q
        # Ejecuta tests; si falla, se detiene el pipeline

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "PYTHONPATH=$PYTHONPATH"
          pytest -q tests/ -vv

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
        continue-on-error: true
        # Revisa buenas prácticas del Dockerfile

  # ===== Build & Push imagen =====
  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set VERSION/TAGS
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            VERSION=$(git describe --tags --abbrev=0)
          else
            VERSION="0.0.0-${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        # Etiqueta la imagen con tag semántico si existe, si no usa el SHA corto

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # Autenticación segura en Docker Hub

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        # Permite builds multi-arquitectura si quisieras (amd64/arm64)

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
        # Construye y publica la imagen versionada y latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}
          format: 'table'
          exit-code: '0'
        # Escaneo de vulnerabilidades (ajusta exit-code a '1' para bloquear)

  # ===== CD: despliegue remoto por SSH =====
deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from previous job
        id: getver
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            VERSION=$(git describe --tags --abbrev=0)
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy via SSH (Simulated)
        run: |
          echo "Conectando al servidor ${{ secrets.SSH_HOST }}..."
          echo "Usuario: ${{ secrets.SSH_USER }}"
          echo "Desplegando imagen: ${{ secrets.DOCKERHUB_USERNAME }}/devops-docker-app:${{ steps.getver.outputs.version }}"
          echo "Actualizando docker-compose.prod.yml..."
          echo "Haciendo pull de la nueva imagen..."
          echo "Reiniciando servicios..."
          sleep 3
          echo "¡El despliegue se ha completado exitosamente!"
